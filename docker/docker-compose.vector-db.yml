version: "3.8"

# Usage:
#   All DBs:        docker compose -f docker/docker-compose.vector-db.yml up -d
#   Single DB:      docker compose -f docker/docker-compose.vector-db.yml up -d qdrant
#   Stop all:       docker compose -f docker/docker-compose.vector-db.yml down -v

services:

  # ─── Qdrant ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: spike_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=WARN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgvector ──────────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: spike_pgvector
    ports:
      - "5433:5432"   # Use 5433 to avoid conflict with local Postgres
    environment:
      - POSTGRES_USER=spike
      - POSTGRES_PASSWORD=spike
      - POSTGRES_DB=vectordb
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spike -d vectordb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Milvus (requires etcd + minio) ────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: spike_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: spike_minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.5
    container_name: spike_milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # HTTP metrics
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

  # ─── OpenSearch ────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: spike_opensearch
    ports:
      - "9200:9200"
      - "9600:9600"   # Performance analyzer
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true   # local dev only
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  qdrant_data:
  pgvector_data:
  etcd_data:
  minio_data:
  milvus_data:
  opensearch_data:
